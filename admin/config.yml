# ────────────────────────────────────────────────────────────────
# Netlify CMS 설정
# 이 파일을 수정해서 저장소 정보를 입력하세요
# ────────────────────────────────────────────────────────────────

backend:
  name: git-gateway # Netlify Identity + Git Gateway 사용
  branch: master # 글이 저장될 브랜치 (main 또는 master)

# 미디어 파일 (이미지 등) 저장 위치
media_folder: "static/uploads"
public_folder: "/static/uploads"

# 로컬 개발 시 로컬 백엔드 활성화 (npx netlify-cms-proxy-server)
# local_backend: true

collections:
  # ── 블로그 글 컬렉션 ──────────────────────────────────────────
  - name: "posts"
    label: "블로그 글"
    label_singular: "글"
    folder: "_posts" # 마크다운 파일이 저장될 폴더
    create: true # 새 글 생성 허용
    delete: true # 글 삭제 허용
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # 파일명 형식
    preview_path: "/#post-{{slug}}"
    editor:
      preview: false # 미리보기 패널 (필요시 true)

    fields:
      - label: "제목"
        name: "title"
        widget: "string"
        hint: "글 목록과 브라우저 탭에 표시됩니다"

      - label: "카테고리"
        name: "category"
        widget: "select"
        options:
          - { label: "⚡ 개발", value: "개발" }
          - { label: "☀️ 일상", value: "일상" }
          - { label: "📚 독서", value: "독서" }
          - { label: "✈️ 여행", value: "여행" }
          - { label: "🗂️ 기타", value: "기타" }
        default: "개발"

      - label: "태그"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "Enter 또는 쉼표로 태그를 추가하세요"

      - label: "요약"
        name: "summary"
        widget: "string"
        required: false
        hint: "글 목록 카드에 표시될 한 줄 설명 (선택)"

      - label: "작성일"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "초안 (비공개)"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "본문"
        name: "body"
        widget: "markdown"
        hint: "마크다운 작성 가능. ```python 코드 블록은 블로그에서 실행 버튼이 생깁니다."
        modes: ["raw", "rich_text"] # raw 모드에서 matplotlib 코드블록 작성 권장
